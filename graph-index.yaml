  system-of-work-is-the-moat-not-the-model:
    title: "The system of work is the moat, not the model — the model is fungible underneath"
    description: "A vertical app company wins by owning the surface where a company's work actually executes — data capture, workflow system of action, and governance — while each new model generation flows through underneath"
    topics: [future-of-ai-business, business-models]
    source: "@joeschmidtiv (Joe Schmidt IV, a16z) — Avoiding Death on the Yellow Brick Road"
    source_file: sources/joeschmidtiv-yellow-brick-road.md

  vertical-workflow-surfaces-capture-knowledge-horizontal-tools-cant:
    title: "The data flywheel is a UX problem — only vertical workflow surfaces can capture the knowledge"
    description: "Two stacked flywheels (across-customer pattern recognition + within-customer tacit rules) accrue only through workflow-specific capture surfaces that horizontal tools structurally cannot shape"
    topics: [ai-native-product-architecture, business-models]
    source: "@joeschmidtiv (Joe Schmidt IV, a16z) — Avoiding Death on the Yellow Brick Road"

  capability-curve-decides-which-work-the-labs-take:
    title: "If a problem improves directly with raw model capability, the labs will take it"
    description: "The Yellow Brick Road test — work that gets better with every pre/post-training dollar (code, writing, images) belongs to the labs; work whose value comes from scaffolding is defensible"
    topics: [future-of-ai-business, business-models]
    source: "@joeschmidtiv (Joe Schmidt IV, a16z) — Avoiding Death on the Yellow Brick Road"
    source_file: sources/joeschmidtiv-yellow-brick-road.md

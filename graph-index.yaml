    description: "Production traces where agents fail become eval cases; better evals improve the harness; better harnesses produce better traces — creating a self-reinforcing improvement loop"
    topics: [ai-agents, ai-native-product-architecture]
    source: "@Vtrivedy10 (Viv) — Better Harness: A Recipe for Harness Hill-Climbing with Evals"
    source_file: sources/vtrivedy10-better-harness-hill-climbing-evals.md
    outgoing: [evals-are-gradient-signal-for-harness-engineering, private-evals-measure-business-outcomes-not-benchmarks, proprietary-feedback-loops-widen-the-moat, traces-are-the-universal-substrate-for-agent-learning]

  traces-are-the-universal-substrate-for-agent-learning:
    title: "Traces are the universal substrate for agent learning — all three layers consume the same execution logs"
    description: "Whether updating model weights, improving harness code, or refining context/memory, agent learning flows start from the same raw material: traces capturing the full execution path of what an agent did"
    topics: [ai-agents, ai-native-product-architecture]
    source: "@hwchase17 (Harrison Chase) — Continual Learning for AI Agents"
    source_file: sources/hwchase17-continual-learning-ai-agents.md
    outgoing: [decision-traces-are-the-missing-data-layer, trace-data-retention-must-match-ai-knowledge-lifespan, traces-not-scores-enable-agent-improvement]

  trace-data-retention-must-match-ai-knowledge-lifespan:
    title: "AI trace data has an indefinite useful lifespan — SaaS observability's 30-day retention model destroys institutional knowledge"
    description: "Infrastructure metrics expire quickly but AI conversations and reasoning traces gain value over time; 30-day retention windows erase the very data that reveals failure patterns and training signals"
    topics: [ai-native-product-architecture, ai-agents]
    source: "@aparnadhinak (Aparna Dhinakaran) — Data Architectures For Tracing Harnesses & Agents"
    source_file: sources/aparnadhinak-data-architectures-tracing.md
    outgoing: [decision-traces-are-the-missing-data-layer, observability-is-the-missing-agent-discipline]

  evals-must-augment-traces-in-place-not-diverge:
    title: "Evaluations must augment trace data in place — divergent copies drift by design"
    description: "The moment you export traces to a separate eval system, the copy diverges from where annotations run; evals, annotations, and traces should share a single source of truth"
    topics: [ai-native-product-architecture]
    source: "@aparnadhinak (Aparna Dhinakaran) — Data Architectures For Tracing Harnesses & Agents"
    source_file: sources/aparnadhinak-data-architectures-tracing.md
    outgoing: [agent-edits-are-automatic-decision-instrumentation, decision-traces-are-the-missing-data-layer]

  teacher-student-trace-distillation-beats-single-oracle:
    title: "Teacher-student trace distillation with consensus validation beats single-oracle learning"
    description: "A single high-reasoning teacher trace isn't reliable enough for enterprise learning; comparing multiple student traces under production constraints with consensus validation produces trustworthy strategies"
    topics: [ai-agents, ai-native-product-architecture]
    source: "@tonygentilcore (Tony Gentilcore, Glean) — Trace Learning for Self-Improving Agents"
    source_file: sources/tonygentilcore-trace-learning-self-improving-agents.md
    outgoing: [error-memory-enables-learning-without-retraining, traces-not-scores-enable-agent-improvement]

  workflow-strategies-beat-individual-tool-instructions:
    title: "Agents need workflow-level tool strategies, not individual tool instructions — the hard part is how tools combine"
    description: "In enterprise environments, the challenge isn't finding the right tool but understanding how tools work together; intentionally narrow strategies that capture workflow patterns generalize better than broad abstractions"
    topics: [ai-agents, knowledge-systems]
    source: "@tonygentilcore (Tony Gentilcore, Glean) — Trace Learning for Self-Improving Agents"
    source_file: sources/tonygentilcore-trace-learning-self-improving-agents.md
    outgoing: [domain-skill-libraries-are-the-real-agent-moat, skill-graphs-enable-progressive-disclosure]

  shadow-execution-enables-safe-trace-learning:
    title: "Shadow execution enables safe trace learning — replay write operations without touching production data"
    description: "By replaying actions that would write to external apps in a shadow path, agents can learn from realistic end-to-end flows without impacting customer data"
    topics: [ai-agents, ai-native-product-architecture]
    source: "@tonygentilcore (Tony Gentilcore, Glean) — Trace Learning for Self-Improving Agents"
    source_file: sources/tonygentilcore-trace-learning-self-improving-agents.md
    outgoing: [error-memory-enables-learning-without-retraining, rollback-safety-nets-enable-autonomy-not-intelligence, traces-not-scores-enable-agent-improvement]

  two-tier-agent-memory-separates-org-from-user:
    title: "Two-tier agent memory separates organizational workflow knowledge from individual user preferences"
    description: "Deployment-level memory captures shared tool strategies and sequencing patterns; user-level memory captures personal templates and communication styles — initially skipping user-level had a significant performance impact"
    topics: [ai-agents, knowledge-systems]
    source: "@tonygentilcore (Tony Gentilcore, Glean) — Trace Learning for Self-Improving Agents"
    source_file: sources/tonygentilcore-trace-learning-self-improving-agents.md
    outgoing: [agent-memory-preserves-institutional-knowledge, context-learning-spans-agent-tenant-and-org-levels, cross-user-knowledge-transfer-needs-no-fine-tuning, memory-is-harness-responsibility-not-plugin]

  compilation-scales-curation-compounds:
    title: "Compilation scales but curation compounds — two camps for knowledge graph construction"
    description: "LLM-compiled systems grow fast by feeding raw content through model judgment; human-curated systems grow slowly but every node is validated — compilation scales linearly, curation compounds through connections"
    topics: [knowledge-systems, ai-agents]
    source: "Ayush Jhunjhunwala — KG Architecture Comparative Research (10+ systems analyzed)"
    source_file: specs/knowledge-graph-architectures/research.md
    outgoing: [compound-engineering-makes-future-work-easier, evolving-summaries-beat-append-only-memory, skill-graphs-enable-progressive-disclosure]

  intelligence-location-determines-system-fragility:
    title: "Intelligence location — code vs prompts — determines system fragility and flexibility"
    description: "Prompt-driven systems are flexible but break when models change; code-driven systems are rigid but reliable — best systems need both"
    topics: [knowledge-systems, ai-native-product-architecture, ai-agents]
    source: "Ayush Jhunjhunwala — KG Architecture Comparative Research (10+ systems analyzed)"
    source_file: specs/knowledge-graph-architectures/research.md
    outgoing: [features-are-prompts-not-code, harness-quality-beats-model-intelligence, production-agents-route-decisions-not-every-call-to-llm, safety-enforcement-belongs-in-tool-design-not-prompts]

  knowledge-evolution-is-the-biggest-unsolved-problem:
    title: "Knowledge evolution is the biggest unsolved problem across all graph architectures"
    description: "Almost nobody has solved how knowledge graphs grow without rotting — most are append-only, auto-decay is too aggressive, and even the best systems only add links without pruning, merging, or detecting contradictions"
    topics: [knowledge-systems, ai-native-product-architecture]
    source: "Ayush Jhunjhunwala — KG Architecture Comparative Research (10+ systems analyzed)"
    source_file: specs/knowledge-graph-architectures/research.md
    outgoing: [context-layers-must-be-living-systems, evolving-summaries-beat-append-only-memory, verification-is-a-red-queen-race]

  knowledge-is-not-memory-ingestion-vs-learning:
    title: "Knowledge is not memory — ingesting documents is solved, learning from interactions is not"
    description: "Knowledge = write-once read-many (ingest→index→query, solved). Memory = continuous learning (observe→learn→update, unsolved). Different infrastructure needed."
    topics: [knowledge-systems, ai-agents]
    source: "@hwchase17 (Harrison Chase) — Everything Gets Rebuilt: Agents, Harnesses, and the New Compute Layer"
    source_file: sources/hwchase17-everything-gets-rebuilt-agents-harnesses.md
    domain: ai
    outgoing: [knowledge-evolution-is-the-biggest-unsolved-problem, context-layers-must-be-living-systems]

  knowledge-systems-need-dual-layer-storage:
    title: "Knowledge systems need dual-layer storage — narrative depth and structured queries can't share a format"
    description: "Every system beyond 'markdown files in a folder' discovers that narrative depth and structured querying need different storage layers with a routing mechanism between them"
    topics: [knowledge-systems, ai-native-product-architecture]
    source: "Ayush Jhunjhunwala — KG Architecture Comparative Research (10+ systems analyzed)"
    source_file: specs/knowledge-graph-architectures/research.md
    outgoing: [files-are-the-universal-agent-interface, structure-plus-reasoning-beats-flat-similarity, three-layer-ai-stack-memory-search-reasoning, two-tier-agent-memory-separates-org-from-user]

  navigation-beats-search-for-knowledge-retrieval:
    title: "Navigation beats search for knowledge retrieval — let each data source keep its native query interface"
    description: "Vector similarity search flattens everything into one embedding space, losing native query affordances; better to let SQL be SQL, files be files, and build a routing layer"
    topics: [knowledge-systems, ai-native-product-architecture]
    source: "Ayush Jhunjhunwala — KG Architecture Comparative Research (10+ systems analyzed)"
    source_file: specs/knowledge-graph-architectures/research.md
    outgoing: [agentic-search-beats-rag-for-live-codebases, similarity-is-not-relevance-relevance-requires-reasoning, structure-plus-reasoning-beats-flat-similarity]

  sand-vs-stone-separates-durable-from-disposable-product-value:
    title: "Sand vs Stone — if models double in capability tomorrow, what washes away and what remains?"
    description: "Framework for evaluating AI product durability: context flywheels and domain expertise are stone; model workarounds and clever engineering are sand"
    topics: [ai-native-product-architecture, future-of-ai-business]
    source: "@izzymiller (Izzy Miller, Hex) relaying Barry McCardel (Hex CEO) — Building AI Agents for Data Analytics"
    source_file: sources/izzymiller-hex-building-ai-agents-data.md
    outgoing: [context-is-the-product-not-the-model, domain-skill-libraries-are-the-real-agent-moat, scaffolding-is-tech-debt-against-the-next-model]

  model-compensations-become-liabilities-as-capabilities-advance:
    title: "Model compensations become liabilities as capabilities advance — yesterday's fixes hobble today's agent"
    description: "Engineering workarounds for earlier model limitations accumulate as technical debt that actively degrades agent performance when models improve"
    topics: [ai-agents, ai-native-product-architecture]
    source: "@izzymiller (Izzy Miller, Hex) — Building AI Agents for Data Analytics"
    source_file: sources/izzymiller-hex-building-ai-agents-data.md
    outgoing: [build-for-the-model-six-months-from-now, scaffolding-is-tech-debt-against-the-next-model, tool-design-is-continuous-observation-see-like-an-agent]

  conflicting-context-causes-agent-collapse-not-graceful-degradation:
    title: "Conflicting context causes agent collapse, not graceful degradation"
    description: "When an LLM encounters contradictory information in its context, it enters extended deliberation loops rather than choosing one interpretation — production finding from Hex"
    topics: [ai-agents, ai-native-product-architecture]
    source: "@izzymiller (Izzy Miller, Hex) — Building AI Agents for Data Analytics"
    source_file: sources/izzymiller-hex-building-ai-agents-data.md
    outgoing: [two-tier-agent-memory-separates-org-from-user]

  context-flywheel-is-day-90-not-day-0:
    title: "The context flywheel is a Day 90 moat — Day 0 comparisons are misleading"
    description: "Point-in-time capability benchmarks miss the compounding advantage: on Day 0 a raw model matches your product, but by Day 90 accumulated context creates an unbridgeable gap"
    topics: [ai-native-product-architecture, business-models]
    source: "@izzymiller (Izzy Miller, Hex) — Building AI Agents for Data Analytics"
    source_file: sources/izzymiller-hex-building-ai-agents-data.md
    outgoing: [agent-trace-accumulation-produces-emergent-world-models, agentic-workflows-encode-intelligence-the-model-cant-read, context-is-the-product-not-the-model, evals-are-behavioral-pressure-vectors-not-neutral-measurements, offload-the-task-but-never-the-learning, proprietary-feedback-loops-widen-the-moat, the-learning-loop-is-the-firms-new-ip-and-it-compounds]

  long-horizon-evals-test-compounding-not-point-accuracy:
    title: "Long-horizon evals test compounding behavior, not point-in-time accuracy"
    description: "Hex's Metric City benchmark simulates 90 days of agent use with evolving data to measure whether the agent gets smarter over time — Day 0: 4%, Day 90: 24%"
    topics: [ai-agents, ai-native-product-architecture]
    source: "@izzymiller (Izzy Miller, Hex) — Building AI Agents for Data Analytics"
    source_file: sources/izzymiller-hex-building-ai-agents-data.md
    outgoing: [evals-are-gradient-signal-for-harness-engineering, holdout-sets-gate-autonomous-harness-optimization, trace-to-eval-flywheel-compounds-agent-quality]

  agent-harnesses-are-persistent-infrastructure:
    title: "Agent harnesses are persistent infrastructure, not scaffolding models will absorb"
    description: "As models improve, old scaffolding disappears but new scaffolding replaces it — harnesses aren't going away, they're evolving"
    topics: [ai-agents, ai-native-product-architecture]
    source: "@hwchase17 (Harrison Chase) — Your harness, your memory"
    source_file: sources/hwchase17-your-harness-your-memory.md
    outgoing: [agents-learn-at-three-layers-model-harness-context, engineering-and-research-have-fused-at-the-frontier, harness-quality-beats-model-intelligence]

  memory-defines-the-agent-portable-memory-is-frontier:
    title: "Memory defines the agent — a zip of markdown files IS the agent, and portable memory between harnesses is the frontier"
    description: "System prompt + skills + tools = procedural memory = agent identity. Portable memory = portable agents. Harness becomes runtime, memory becomes program."
    topics: [ai-agents, knowledge-systems]
    source: "@hwchase17 (Harrison Chase) — Everything Gets Rebuilt: Agents, Harnesses, and the New Compute Layer"
    source_file: sources/hwchase17-everything-gets-rebuilt-agents-harnesses.md
    domain: ai
    outgoing: [files-are-the-universal-agent-interface, memory-is-where-agent-lock-in-lives, skills-as-markdown-replace-fine-tuning]

  memory-is-harness-responsibility-not-plugin:
    title: "Memory is a harness responsibility, not a pluggable component"
    description: "Managing context — what enters, what survives compaction, what's queryable — is a core capability of the harness itself, not an add-on service"
    topics: [ai-native-product-architecture, knowledge-systems]
    source: "@hwchase17 (Harrison Chase) — Your harness, your memory (citing Sarah Wooders, Letta)"
    source_file: sources/hwchase17-your-harness-your-memory.md
    outgoing: [agent-memory-preserves-institutional-knowledge, context-is-the-product-not-the-model, two-tier-agent-memory-separates-org-from-user]

  closed-harnesses-behind-apis-create-memory-lock-in:
    title: "Closed harnesses behind APIs create memory lock-in by design"
    description: "When the harness lives behind a proprietary API, memory state and schema become invisible and non-portable — model providers are incentivized to push more of the harness behind their APIs"
    topics: [ai-agents, business-models]
    source: "@hwchase17 (Harrison Chase) — Your harness, your memory"
    source_file: sources/hwchase17-your-harness-your-memory.md
    outgoing: [context-is-the-product-not-the-model, memory-is-where-agent-lock-in-lives, proprietary-feedback-loops-widen-the-moat]

  memory-is-where-agent-lock-in-lives:
    title: "Memory is where agent lock-in lives — without it, agents are commoditized"
    description: "Stateless model APIs are easily swapped; stateful memory creates a proprietary dataset of user interactions and preferences that makes the agent sticky and differentiated"
    topics: [business-models, ai-agents]
    source: "@hwchase17 (Harrison Chase) — Your harness, your memory"
    source_file: sources/hwchase17-your-harness-your-memory.md
    outgoing: [closed-harnesses-behind-apis-create-memory-lock-in, context-is-the-product-not-the-model, memory-defines-the-agent-portable-memory-is-frontier, procedural-memory-is-highest-impact-agent-memory, proprietary-feedback-loops-widen-the-moat]

  open-harnesses-with-owned-databases-prevent-model-provider-lock-in:
    title: "Open harnesses with customer-owned databases are the antidote to model-provider lock-in"
    description: "An open, model-agnostic harness that stores memory in a database you control (Postgres, Mongo, Redis) keeps both model choice and memory portable"
    topics: [ai-native-product-architecture, business-models]
    source: "@hwchase17 (Harrison Chase) — Your harness, your memory"
    source_file: sources/hwchase17-your-harness-your-memory.md
    outgoing: [boring-tech-wins-for-ai-native-startups, evolved-harnesses-transfer-across-models, harness-quality-beats-model-intelligence, memory-is-where-agent-lock-in-lives, model-portability-is-the-sovereignty-test]

  organizational-shape-is-the-emerging-moat-in-ai:
    title: "Organizational shape is the emerging moat in AI — what AI cannot copy is the institution underneath"
    description: "When models improve fast, interfaces converge, and product velocity becomes cheap, the durable advantage moves to how a company attracts exceptional people, distributes authority, and compounds judgment over time"
    topics: [future-of-ai-business, economics]
    source: "@JayaGup10 (Jaya Gupta) — The next biggest moat in AI"
    source_file: sources/jayagup10-organizational-shape-is-the-moat.md
    domain: ai
    outgoing: [a-frontier-without-an-ecosystem-is-not-stable, dissolved-constraints-shift-bottleneck-to-judgment, great-companies-are-wrappers-around-a-kind-of-person, llms-selectively-destroy-vertical-software-moats, proprietary-feedback-loops-widen-the-moat, system-of-work-is-the-moat-not-the-model]

  great-companies-are-wrappers-around-a-kind-of-person:
    title: "Great companies are wrappers around a kind of person — institutions that make a new kind of person possible"
    description: "The most important companies are organizational inventions: they create a new kind of institution around a new kind of work, and in doing so, they let a certain kind of talent finally express themselves"
    topics: [economics, philosophy]
    source: "@JayaGup10 (Jaya Gupta) — The next biggest moat in AI"
    source_file: sources/jayagup10-organizational-shape-is-the-moat.md
    domain: mental-models
    outgoing: [organizational-shape-is-the-emerging-moat-in-ai, scale-advantages-cascade-until-bureaucracy-kills-them]

  emotional-promises-must-be-structural-promises:
    title: "Emotional promises must be structural promises — if the structure doesn't back the pitch, the promise is fake"
    description: "Each cultural claim — ownership, customer proximity, speed, talent density — is a structural commitment about decision rights, status hierarchy, and authority allocation; misalignment between the two reads as fake even when candidates can't articulate it"
    topics: [decision-making, engineering]
    source: "@JayaGup10 (Jaya Gupta) — The next biggest moat in AI"
    source_file: sources/jayagup10-organizational-shape-is-the-moat.md
    domain: mental-models
    outgoing: [ask-for-no-not-yes-to-accelerate-decisions, being-chosen-vs-being-seen-is-the-talent-trap, organizational-shape-is-the-emerging-moat-in-ai]

  mission-strength-is-measured-by-who-it-repels:
    title: "Mission strength is measured by who it repels — the strongest missions make some people refuse to work there"
    description: "A mission that offends no one, selects for no one, and costs nothing is functionally fake; the strongest missions take a side, and the people they repel are the same signal as the people they attract"
    topics: [psychology, decision-making]
    source: "@JayaGup10 (Jaya Gupta) — The next biggest moat in AI"
    source_file: sources/jayagup10-organizational-shape-is-the-moat.md
    domain: mental-models
    outgoing: [emotional-promises-must-be-structural-promises, great-companies-are-wrappers-around-a-kind-of-person]

  being-chosen-vs-being-seen-is-the-talent-trap:
    title: "Being chosen vs being seen — emotional validation captures founder-level intensity at employee-level structure"
    description: "Being chosen is emotional: you are special, we believe in you, you belong here. Being seen is structural: scope, authority, economic participation, decision rights — the trap is paying in identity what you don't want to pay in structure"
    topics: [psychology, economics]
    source: "@JayaGup10 (Jaya Gupta) — The next biggest moat in AI"
    source_file: sources/jayagup10-organizational-shape-is-the-moat.md
    domain: mental-models
    outgoing: [emotional-promises-must-be-structural-promises, time-denominated-promises-decay-invisibly]

  time-denominated-promises-decay-invisibly:
    title: "Time-denominated promises decay invisibly — 'over time' is the most dangerous denomination because time doesn't announce itself as it leaves"
    description: "Promises in the 'over time it'll be bigger / you'll own more / the structure will catch up' shape rot silently because they lack a written mechanism that forces them to mature"
    topics: [decision-making, psychology]
    source: "@JayaGup10 (Jaya Gupta) — The next biggest moat in AI"
    source_file: sources/jayagup10-organizational-shape-is-the-moat.md
    domain: mental-models
    outgoing: [being-chosen-vs-being-seen-is-the-talent-trap]

  reasoning-by-analogy-has-a-ceiling:
    title: "Reasoning by analogy has a ceiling — you can never get beyond what already exists by copying what already exists"
    description: "Analogy is faster, easier, and less mentally taxing — fine for most decisions — but it forecloses any solution outside the existing solution set; first-principles is the only path that produces non-incremental answers"
    topics: [decision-making, philosophy]
    source: "@jaynitx — first principles thinking: how to see what everyone else misses"
    source_file: sources/jaynitx-first-principles-thinking.md
    domain: mental-models
    outgoing: [invert-always-invert-to-solve-hard-problems, new-tech-first-imitates-the-medium-it-replaces, templates-encode-someone-elses-constraints]

  templates-encode-someone-elses-constraints:
    title: "Templates encode someone else's constraints — copying a playbook silently imports its assumptions about audience, resources, and strengths"
    description: "Templates work because they were tuned for a specific situation; copying them imports invisible assumptions about who you are and what you have, and the misfit only shows up after you've spent the time"
    topics: [decision-making, psychology]
    source: "@jaynitx — first principles thinking: how to see what everyone else misses"
    source_file: sources/jaynitx-first-principles-thinking.md
    domain: mental-models
    outgoing: [first-principles-thinking-is-responsibility-taking, reasoning-by-analogy-has-a-ceiling]

  type-1-vs-type-2-decisions-allocate-thinking-modes:
    title: "Type 1 vs Type 2 decisions — irreversibility decides whether to spend first-principles thinking or analogy"
    description: "Bezos's split: irreversible decisions deserve slow methodical first-principles thinking; reversible ones should use fast analogy. The mistake is misallocating the modes"
    topics: [decision-making, engineering]
    source: "@jaynitx — first principles thinking: how to see what everyone else misses"
    source_file: sources/jaynitx-first-principles-thinking.md
    domain: mental-models
    outgoing: [circle-of-competence-determines-where-you-can-win, reasoning-by-analogy-has-a-ceiling]

  first-principles-thinking-is-responsibility-taking:
    title: "First-principles thinking is uncomfortable because it transfers responsibility — analogy outsources blame to 'best practices'"
    description: "When you reason by analogy you have a defense ('I did what everyone said'); when you reason from first principles you own the outcome. The discomfort is responsibility, not difficulty"
    topics: [psychology, decision-making]
    source: "@jaynitx — first principles thinking: how to see what everyone else misses"
    source_file: sources/jaynitx-first-principles-thinking.md
    domain: mental-models
    outgoing: [latticework-of-models-beats-isolated-facts, reasoning-by-analogy-has-a-ceiling]

  users-describe-solutions-within-the-constraint-set-they-know:
    title: "Users describe solutions within the constraint set they know — 'faster horses' is what stated preferences look like outside the existing tool set"
    description: "When asked what they want, users reason by analogy from existing tools and return better versions of those tools; first-principles asks what underlying problem is being solved, which is invisible to the user but where the actual opportunity lives"
    topics: [psychology, decision-making]
    source: "@jaynitx — first principles thinking: how to see what everyone else misses"
    source_file: sources/jaynitx-first-principles-thinking.md
    domain: mental-models
    outgoing: [reasoning-by-analogy-has-a-ceiling, revealed-preferences-trump-stated-preferences]

  peter-thiel-test-detects-actual-first-principles-thinking:
    title: "Peter Thiel's question is a detector for actual first-principles thinking — if your conclusions match the crowd, you're analogizing"
    description: "'What important truth do very few people agree with you on?' is the diagnostic — most people can't answer because most people reason by analogy and end up with the same conclusions as everyone else"
    topics: [decision-making, philosophy]
    source: "@jaynitx — first principles thinking: how to see what everyone else misses"
    source_file: sources/jaynitx-first-principles-thinking.md
    domain: mental-models
    outgoing: [first-principles-thinking-is-responsibility-taking, reasoning-by-analogy-has-a-ceiling]

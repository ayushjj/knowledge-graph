nodes:
  choose-problems-backward-from-an-outcome-you-want:
    title: "Reason backward from an outcome you want to exist — it manufactures originality that absorbed problems can't"
    description: "Absorbed problems hand you the conclusion without the reasoning, on a crowded racetrack; choosing an outcome you genuinely want and reasoning backward to the experiments drags you into territory no survey paper covers"
    topics: [decision-making, future-of-ai-business]
    source: "@itsreallyvivek (vivek) — how to be good at research"
    source_file: sources/itsreallyvivek-how-to-be-good-at-research.md
    domain: ai
    outgoing: [differentiated-inputs-beat-the-shared-reading-list, first-principles-thinking-is-responsibility-taking, peter-thiel-test-detects-actual-first-principles-thinking, reasoning-by-analogy-has-a-ceiling]

  taste-is-a-muscle-trained-by-forecasting:
    title: "Taste is a muscle, not a gift — train it by forecasting every result before you see it"
    description: "Predict the outcome of every experiment before running it, guess a paper's numbers from the method alone, call which releases will matter in two years and check your hit rate; a forecast plus a correction, repeated a few hundred times, trains the model in your head the way it trains any other model"
    topics: [decision-making, knowledge-systems]
    source: "@itsreallyvivek (vivek) — how to be good at research"
    source_file: sources/itsreallyvivek-how-to-be-good-at-research.md
    domain: ai
    outgoing: [ai-compresses-execution-not-judgment, amplification-widens-the-judgment-gap, choose-problems-backward-from-an-outcome-you-want, dissolved-constraints-shift-bottleneck-to-judgment]

  differentiated-inputs-beat-the-shared-reading-list:
    title: "Shared inputs produce shared conclusions worth nothing — old and cross-disciplinary material is criminally underpriced"
    description: "If your information diet is trending arxiv plus the group chat, you reach the same conclusions as everyone else at the same time, which makes them worthless. Old material (MoE 1991, LSTMs 1997, the bitter lesson) and cross-disciplinary range are underpriced sources of differentiated ideas"
    topics: [decision-making, knowledge-systems]
    source: "@itsreallyvivek (vivek) — how to be good at research"
    source_file: sources/itsreallyvivek-how-to-be-good-at-research.md
    domain: ai
    outgoing: [building-beats-following-for-ai-mastery, latticework-of-models-beats-isolated-facts, peter-thiel-test-detects-actual-first-principles-thinking, reasoning-by-analogy-has-a-ceiling]

  writing-is-the-cheapest-defense-against-fooling-yourself:
    title: "Writing is the cheapest defense against fooling yourself — the page finds the gaps your head papers over"
    description: "An idea feels fully formed until you try to word it; writing exposes the untested assumption, the step that doesn't follow, the two claims that contradict. Darwin made it procedural — log disconfirming evidence on the spot, because memory deletes inconvenient results faster than convenient ones"
    topics: [knowledge-systems, decision-making]
    source: "@itsreallyvivek (vivek) — how to be good at research"
    source_file: sources/itsreallyvivek-how-to-be-good-at-research.md
    domain: ai
    outgoing: [latticework-of-models-beats-isolated-facts, non-attached-action-enables-clearer-course-correction, specs-are-external-memory-surviving-context-resets]

  clear-explanation-is-a-contribution-and-a-credential:
    title: "A clear public explanation is a genuine contribution and an unfakeable credential"
    description: "Fields choke on undigested ideas, so distilling something hard into a clear explanation is real work, not a service job — and a body of public writing doubles as the strongest credential you can hold, because it's an unfakeable sample of how you think"
    topics: [knowledge-systems, future-of-ai-business]
    source: "@itsreallyvivek (vivek) — how to be good at research"
    source_file: sources/itsreallyvivek-how-to-be-good-at-research.md
    domain: ai
    outgoing: [building-beats-following-for-ai-mastery, compound-engineering-makes-future-work-easier, dont-be-the-discriminator-be-the-patron]

  research-speed-is-the-rate-you-discover-youre-wrong:
    title: "Research speed is mostly the speed at which you discover you're wrong — which makes tooling a first-class research activity"
    description: "The edge isn't a stroke of genius but volume: more runs per day, more wrong ideas discarded per week, a faster-updating model of reality. That makes one-command runs, config-reproducible experiments, and seconds-not-archaeology run comparison core research work, not chores"
    topics: [ai-coding-tools, engineering]
    source: "@itsreallyvivek (vivek) — how to be good at research"
    source_file: sources/itsreallyvivek-how-to-be-good-at-research.md
    domain: ai
    outgoing: [autonomous-loops-need-small-stories-and-fast-feedback, engineering-and-research-have-fused-at-the-frontier, harness-quality-beats-model-intelligence, speed-without-feedback-amplifies-errors, verification-multiplies-agent-output-quality]

  engineering-and-research-have-fused-at-the-frontier:
    title: "Engineering is no longer the junior partner — at the frontier, research and engineering have fused"
    description: "The researcher who can build the harness, the eval, and the data pipeline is the one whose hypotheses actually get tested; everyone else waits in a queue. The split between 'has ideas' and 'can run them' has collapsed into one role"
    topics: [ai-coding-tools, future-of-ai-business]
    source: "@itsreallyvivek (vivek) — how to be good at research"
    source_file: sources/itsreallyvivek-how-to-be-good-at-research.md
    domain: ai
    outgoing: [agent-harnesses-are-persistent-infrastructure, every-role-codes-when-implementation-cost-drops-to-zero, harness-quality-beats-model-intelligence, research-speed-is-the-rate-you-discover-youre-wrong]

  stare-at-raw-outputs-not-the-loss-curve:
    title: "A loss curve is reassurance, not analysis — pull a hundred failures and read every one"
    description: "Experiments throw off far more information than you consume — transcripts, failure cases, the strange tail — and most of it dies unread. Most ML bugs live in the data and fail silently; Ng's move is to pull 100 failures, sort them into piles, and attack the biggest pile"
    topics: [ai-native-product-architecture, knowledge-systems]
    source: "@itsreallyvivek (vivek) — how to be good at research"
    source_file: sources/itsreallyvivek-how-to-be-good-at-research.md
    domain: ai
    outgoing: [llm-judge-must-calibrate-against-human-judgment, observability-is-the-missing-agent-discipline, revealed-preferences-trump-stated-preferences, similarity-is-not-relevance-relevance-requires-reasoning, traces-replace-code-as-agent-source-of-truth]

  wander-across-subfields-before-you-settle:
    title: "Your first subfield is an accident of timing — wander across several before you settle, because breadth is insurance"
    description: "Pay tuition in interpretability, evals, rl, and systems before deciding where you live; somewhere is a corner where your specific weirdness is an unfair advantage. Subfields all saturate, usually right after they peak on twitter, and breadth is what carries you through the transition"
    topics: [decision-making, future-of-ai-business]
    source: "@itsreallyvivek (vivek) — how to be good at research"
    source_file: sources/itsreallyvivek-how-to-be-good-at-research.md
    domain: ai
    outgoing: [building-beats-following-for-ai-mastery, circle-of-competence-determines-where-you-can-win, latticework-of-models-beats-isolated-facts]

  price-of-intelligence-is-the-new-organizing-axis:
    title: "The price of intelligence is the new organizing axis — labs, applications, and countries are all fighting to set it"
    description: "The cost of intelligence is no longer an input to software but the axis around which companies, markets, and geopolitics reorganize; labs want usage routed through them, applications want to allocate intelligence better than labs, countries want it cheap enough to be national infrastructure"
    topics: [future-of-ai-business, business-models]
    source: "@JayaGup10 (Jaya Gupta) — Who will set price / intelligence?"
    source_file: sources/jayagup10-who-sets-price-of-intelligence.md
    domain: ai
    outgoing: [ai-strategy-is-a-self-rewriting-equation, commodity-terminal-value-zero-expert-judgment-compounds, inference-time-compute-makes-cost-per-outcome-a-choice, llm-competition-fragments-markets-not-consolidates, self-disruption-follows-the-value-chain-downward]

  ai-strategy-is-a-self-rewriting-equation:
    title: "AI strategy is a self-rewriting equation — solving one constraint changes which constraint matters next"
    description: "SaaS metrics were downstream of just two forces (distribution cost + switching cost); AI has many coupled variables — capability, cost, latency, deployment, regulation, talent — each decomposing into sub-curves, so the equation rewrites itself faster than any fixed playbook can track"
    topics: [future-of-ai-business, decision-making]
    source: "@JayaGup10 (Jaya Gupta) — Who will set price / intelligence?"
    source_file: sources/jayagup10-who-sets-price-of-intelligence.md
    domain: ai
    outgoing: [build-for-the-model-six-months-from-now, building-in-ai-is-running-a-trading-book, layer-migration-is-the-real-threat-not-competition, price-of-intelligence-is-the-new-organizing-axis, sand-vs-stone-separates-durable-from-disposable-product-value, scaffolding-is-tech-debt-against-the-next-model]

  layer-migration-is-the-real-threat-not-competition:
    title: "In AI the threat is layer migration, not a competitor — work relocates across layers when any variable moves"
    description: "In SaaS a rival company killed you; the one exception was platform dependency, where a pricing or terms change could wipe you out. AI makes that exception the default — work migrates into the model, an open-weight alternative, the customer's data platform, an agent runtime, or the device itself"
    topics: [future-of-ai-business, business-models]
    source: "@JayaGup10 (Jaya Gupta) — Who will set price / intelligence?"
    source_file: sources/jayagup10-who-sets-price-of-intelligence.md
    domain: ai
    outgoing: [llms-selectively-destroy-vertical-software-moats, model-compensations-become-liabilities-as-capabilities-advance, scaffolding-is-tech-debt-against-the-next-model, self-disruption-follows-the-value-chain-downward]

  inference-time-compute-makes-cost-per-outcome-a-choice:
    title: "Inference-time compute makes cost-per-outcome a choice — and that's the application layer's counterattack on the labs"
    description: "No prior software had a dial where 10x more compute buys a better answer; a 10-second and a 10-minute query on the same model are different products at different prices. Margin depends on the system's judgment of where to spend tokens, not on model pricing — the lab wants to expand usage, the application wants to spend only where the outcome is worth it"
    topics: [ai-native-product-architecture, business-models]
    source: "@JayaGup10 (Jaya Gupta) — Who will set price / intelligence?"
    source_file: sources/jayagup10-who-sets-price-of-intelligence.md
    domain: ai
    outgoing: [multi-model-orchestration-beats-any-single-family, operate-across-the-whole-model-market-not-just-one-lab, production-agents-route-decisions-not-every-call-to-llm, system-of-work-is-the-moat-not-the-model, task-horizon-breaks-seat-based-pricing]

  task-horizon-breaks-seat-based-pricing:
    title: "Task horizon breaks seat-based pricing — usage scales with workflow depth × length, not headcount"
    description: "Task horizon is the length dial: how long an AI works on its own before a human steps in. The unit shifted from the call to the workflow — agents run for hours, spawn sub-agents, and burn millions of tokens per decision path, so usage stops scaling with seats; multiply length by depth to get the token bill"
    topics: [business-models, ai-agents]
    source: "@JayaGup10 (Jaya Gupta) — Who will set price / intelligence?"
    source_file: sources/jayagup10-who-sets-price-of-intelligence.md
    domain: ai
    outgoing: [autonomous-loops-need-small-stories-and-fast-feedback, autopilots-capture-work-budget-not-tool-budget, inference-time-compute-makes-cost-per-outcome-a-choice, sell-the-work-not-the-tool, token-spend-replaces-headcount-as-scaling-unit]

  where-inference-runs-decides-margin-context-and-trust:
    title: "Where inference runs decides who captures margin, owns the context, and earns trust"
    description: "Value won't all accrue to the cloud — inference moves to wherever it's cheapest without breaking the product: cloud for frontier reasoning, edge for latency, on-device for privacy. Privacy matters more than in SaaS because the model isn't just storing data, it's reasoning over the user's context, memory, code, and permissions"
    topics: [ai-native-product-architecture, business-models]
    source: "@JayaGup10 (Jaya Gupta) — Who will set price / intelligence?"
    source_file: sources/jayagup10-who-sets-price-of-intelligence.md
    domain: ai
    outgoing: [context-is-the-product-not-the-model, memory-is-where-agent-lock-in-lives, permissioned-inference-is-harder-than-permissioned-retrieval]

  building-in-ai-is-running-a-trading-book:
    title: "Building in AI is running a trading book — you're long some curves, short others, and exposed to correlations that break when they matter"
    description: "Value in AI is never captured once and defended; it's continuously repriced and relocated. Durable companies know which assumptions they're long and which they're short, choose which variables to bet on, know which can kill them, and build to recover faster than a wrong bet can compound"
    topics: [decision-making, future-of-ai-business]
    source: "@JayaGup10 (Jaya Gupta) — Who will set price / intelligence?"
    source_file: sources/jayagup10-who-sets-price-of-intelligence.md
    domain: ai
    outgoing: [ai-strategy-is-a-self-rewriting-equation, build-for-the-model-six-months-from-now, organizational-shape-is-the-emerging-moat-in-ai, sand-vs-stone-separates-durable-from-disposable-product-value]

  human-capital-and-token-capital-compound-together:
    title: "Every firm must build two capitals — human capital and token capital — and they compound together, not at each other's expense"
    description: "Human capital is the knowledge, judgment, relationships, and pattern recognition of a firm's people; token capital is the AI capability it builds and owns — and human capital only becomes MORE valuable as token capital grows"
    topics: [future-of-ai-business, business-models]
    source: "@satyanadella (Satya Nadella) — A frontier without an ecosystem is not stable"
    source_file: sources/satyanadella-frontier-without-ecosystem.md
    domain: ai
    outgoing: [automation-amplifies-expert-demand, dont-be-the-discriminator-be-the-patron, system-of-work-is-the-moat-not-the-model]

  offload-the-task-but-never-the-learning:
    title: "You can offload a task, or even a job, but you can never offload your learning"
    description: "The real opportunity isn't picking the best model — it's building a learning loop on top of models where the firm's accumulated learning, the one thing it can't outsource, compounds across people and AI"
    topics: [future-of-ai-business, knowledge-systems]
    source: "@satyanadella (Satya Nadella) — A frontier without an ecosystem is not stable"
    source_file: sources/satyanadella-frontier-without-ecosystem.md
    domain: ai
    outgoing: [agent-memory-preserves-institutional-knowledge, compound-engineering-makes-future-work-easier, context-flywheel-is-day-90-not-day-0, system-of-work-is-the-moat-not-the-model]

  model-portability-is-the-sovereignty-test:
    title: "The sovereignty test — can you swap out a generalist model without losing your 'company veteran' expertise?"
    description: "A firm controls its IP only if it can switch the underlying generalist model while keeping the company-veteran expertise built into its learning system; that portability is the test of control and sovereignty in the AI era"
    topics: [ai-native-product-architecture, business-models]
    source: "@satyanadella (Satya Nadella) — A frontier without an ecosystem is not stable"
    source_file: sources/satyanadella-frontier-without-ecosystem.md
    domain: ai
    outgoing: [closed-harnesses-behind-apis-create-memory-lock-in, open-harnesses-with-owned-databases-prevent-model-provider-lock-in, operate-across-the-whole-model-market-not-just-one-lab, system-of-work-is-the-moat-not-the-model]

  private-evals-measure-business-outcomes-not-benchmarks:
    title: "Private evals should measure business outcomes that matter — not external benchmarks"
    description: "A firm's learning loop runs on private evals tied to real business outcomes and private RL environments trained on internal traces, so the model improves against what the company cares about rather than public leaderboards"
    topics: [ai-native-product-architecture, ai-agents]
    source: "@satyanadella (Satya Nadella) — A frontier without an ecosystem is not stable"
    source_file: sources/satyanadella-frontier-without-ecosystem.md
    domain: ai
    outgoing: [decision-traces-are-the-missing-data-layer, evals-are-behavioral-pressure-vectors-not-neutral-measurements, trace-to-eval-flywheel-compounds-agent-quality, traces-not-scores-enable-agent-improvement]

  the-learning-loop-is-the-firms-new-ip-and-it-compounds:
    title: "The learning loop becomes the firm's new IP — a hill-climbing machine that compounds unlike any other asset"
    description: "Every improved workflow generates better training signal, which accelerates the accumulation of tacit knowledge unique to the firm; companies that build this loop early gain an advantage that's hard to replicate regardless of any new model capability"
    topics: [future-of-ai-business, ai-native-product-architecture]
    source: "@satyanadella (Satya Nadella) — A frontier without an ecosystem is not stable"
    source_file: sources/satyanadella-frontier-without-ecosystem.md
    domain: ai
    outgoing: [compound-engineering-makes-future-work-easier, context-flywheel-is-day-90-not-day-0, proprietary-feedback-loops-widen-the-moat, system-of-work-is-the-moat-not-the-model, trace-to-eval-flywheel-compounds-agent-quality]

  a-frontier-without-an-ecosystem-is-not-stable:
    title: "A frontier without an ecosystem is not stable — if a few models capture all value, the political economy won't tolerate it"
    description: "The priority must be building a frontier ecosystem, not just a frontier model, so value flows broadly across companies and industries; concentrating all returns in a few models that hollow out industries has no societal permission and is not a stable equilibrium"
    topics: [future-of-ai-business, business-models]
    source: "@satyanadella (Satya Nadella) — A frontier without an ecosystem is not stable"
    source_file: sources/satyanadella-frontier-without-ecosystem.md
    domain: ai
    outgoing: [llms-selectively-destroy-vertical-software-moats, organizational-shape-is-the-emerging-moat-in-ai, technology-helps-moats-kills-commodity-businesses]

  reorganize-around-agents-dont-bolt-them-onto-old-workflows:
    title: "The gains come from redesigning work around AI, not bolting AI onto human workflows"
    description: "Like factory owners who first swapped waterwheels for steam engines and changed nothing else (modest gains), today's orgs bolt chatbots onto human-designed workflows — the explosion comes only when the work is redesigned around agents"
    topics: [future-of-ai-business, ai-native-product-architecture]
    source: "@ivanhzhao (Ivan Zhao, Notion CEO) — Steam, Steel, and Infinite Minds"
    source_file: sources/ivanhzhao-steam-steel-infinite-minds.md
    domain: ai
    outgoing: [dissolved-constraints-shift-bottleneck-to-judgment, new-tech-first-imitates-the-medium-it-replaces, scaffolding-is-tech-debt-against-the-next-model, self-disruption-follows-the-value-chain-downward]

  new-tech-first-imitates-the-medium-it-replaces:
    title: "New technology first imitates the medium it replaces — the transition form hides the final form"
    description: "Early phone calls were telegram-terse, early movies were filmed stage plays, and today's AI is a chatbot mimicking a search box; McLuhan's 'driving into the future via the rearview window' is why we mistake the imitation phase for the destination"
    topics: [future-of-ai-business, decision-making]
    source: "@ivanhzhao (Ivan Zhao, Notion CEO) — Steam, Steel, and Infinite Minds"
    source_file: sources/ivanhzhao-steam-steel-infinite-minds.md
    domain: ai
    outgoing: [build-for-the-model-six-months-from-now, reasoning-by-analogy-has-a-ceiling, reorganize-around-agents-dont-bolt-them-onto-old-workflows]

  ai-is-steel-context-bearing-systems-lift-the-org-scaling-limit:
    title: "AI is steel for organizations — when software carries the context, human communication stops being the load-bearing wall"
    description: "Before steel, buildings capped at six or seven floors because iron buckled under its own weight; AI that maintains context across workflows removes human communication (meetings, messages) as the structure that caps how far an org can scale before it degrades"
    topics: [future-of-ai-business, ai-native-product-architecture]
    source: "@ivanhzhao (Ivan Zhao, Notion CEO) — Steam, Steel, and Infinite Minds"
    source_file: sources/ivanhzhao-steam-steel-infinite-minds.md
    domain: ai
    outgoing: [agent-memory-preserves-institutional-knowledge, context-centralization-is-why-coding-ai-works, dissolved-constraints-shift-bottleneck-to-judgment, organizational-shape-is-the-emerging-moat-in-ai]

  supervise-loops-from-a-leveraged-point-not-from-inside-them:
    title: "Humans should supervise agent loops from a leveraged point, not sit inside every one"
    description: "Human-in-the-loop isn't always desirable — putting a person inside every iteration is the Red Flag Act (a man legally required to walk ahead of every car waving a flag); the goal is leveraged oversight of many loops, not manual inspection of each"
    topics: [ai-agents, ai-coding-tools]
    source: "@ivanhzhao (Ivan Zhao, Notion CEO) — Steam, Steel, and Infinite Minds"
    source_file: sources/ivanhzhao-steam-steel-infinite-minds.md

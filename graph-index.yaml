  technology-helps-moats-kills-commodity-businesses:
    title: "Technology helps moat businesses but kills commodity businesses"
    description: "In commodity businesses, productivity improvements flow entirely to customers; in businesses with competitive advantages, the same improvements go to the bottom line"

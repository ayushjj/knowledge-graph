<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Product Building Knowledge Graph</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      overflow: hidden;
      height: 100vh;
    }

    #graph-container {
      position: absolute;
      inset: 0;
    }

    /* Topic filter pills */
    #filters {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      z-index: 10;
    }

    .filter-pill {
      padding: 5px 12px;
      border-radius: 20px;
      border: 2px solid;
      background: rgba(15, 17, 23, 0.8);
      color: #e2e8f0;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }

    .filter-pill:hover { background: rgba(255, 255, 255, 0.1); }
    .filter-pill.active { background: var(--pill-color); color: #0f1117; font-weight: 600; }

    /* Title badge */
    #title-badge {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 10;
      font-size: 11px;
      color: #64748b;
    }

    #title-badge a { color: #64748b; text-decoration: underline; }

    /* Sidebar */
    #sidebar {
      position: absolute;
      top: 0;
      right: 0;
      width: 380px;
      height: 100vh;
      background: #1a1d27;
      border-left: 1px solid #2d3348;
      z-index: 20;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar.open { transform: translateX(0); }

    #sidebar-close {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      color: #64748b;
      font-size: 22px;
      cursor: pointer;
      z-index: 21;
      line-height: 1;
    }

    #sidebar-close:hover { color: #e2e8f0; }

    #sidebar-header {
      padding: 20px 20px 12px;
      border-bottom: 1px solid #2d3348;
      flex-shrink: 0;
    }

    #sidebar-title {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.3;
      padding-right: 30px;
      color: #f1f5f9;
    }

    #sidebar-meta {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .topic-tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
    }

    #sidebar-source {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 8px;
    }

    #sidebar-body {
      padding: 16px 20px;
      overflow-y: auto;
      flex: 1;
    }

    #sidebar-prose {
      font-size: 14px;
      line-height: 1.7;
      color: #cbd5e1;
    }

    #sidebar-prose p { margin-bottom: 12px; }
    #sidebar-prose a.wikilink {
      color: #818cf8;
      text-decoration: none;
      border-bottom: 1px dashed #818cf8;
      cursor: pointer;
    }
    #sidebar-prose a.wikilink:hover { color: #a5b4fc; border-color: #a5b4fc; }

    #sidebar-connections {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #2d3348;
    }

    #sidebar-connections h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-bottom: 8px;
    }

    .connection-link {
      display: block;
      padding: 6px 0;
      font-size: 13px;
      color: #94a3b8;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.15s;
    }

    .connection-link:hover { color: #e2e8f0; }
    .connection-link .arrow { margin-right: 6px; opacity: 0.5; }

    /* Tooltip */
    #tooltip {
      position: absolute;
      padding: 6px 12px;
      background: #1e2130;
      border: 1px solid #3d4462;
      border-radius: 6px;
      font-size: 13px;
      color: #e2e8f0;
      pointer-events: none;
      z-index: 30;
      display: none;
      max-width: 300px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Onboarding overlay */
    #onboarding {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      background: rgba(26, 29, 39, 0.92);
      border: 1px solid #3d4462;
      border-radius: 12px;
      padding: 16px 24px;
      text-align: center;
      max-width: 420px;
      transition: opacity 0.5s;
    }

    #onboarding h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #f1f5f9;
    }

    #onboarding ul {
      list-style: none;
      text-align: left;
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.8;
    }

    #onboarding ul span { color: #e2e8f0; font-weight: 500; }

    #onboarding.hidden { opacity: 0; pointer-events: none; }

    /* Mobile: sidebar as bottom drawer */
    @media (max-width: 640px) {
      #sidebar {
        width: 100%;
        height: 60vh;
        top: auto;
        bottom: 0;
        right: 0;
        border-left: none;
        border-top: 1px solid #2d3348;
        border-radius: 16px 16px 0 0;
        transform: translateY(100%);
      }
      #sidebar.open { transform: translateY(0); }
      #filters { max-width: calc(100% - 24px); }
    }
  </style>
</head>
<body>
  <div id="graph-container"></div>

  <div id="filters"></div>

  <div id="title-badge">
    Ayush's AI Knowledge Graph &mdash; 62 insights
    &middot; <a href="https://github.com/ayushjj/knowledge-graph">GitHub</a>
  </div>

  <div id="tooltip"></div>

  <div id="onboarding">
    <h2>How to explore</h2>
    <ul>
      <li><span>Scroll</span> to zoom in/out</li>
      <li><span>Drag background</span> to pan around</li>
      <li><span>Click a node</span> to read the full insight</li>
      <li><span>Click topic pills</span> above to filter by category</li>
    </ul>
  </div>

  <div id="sidebar">
    <button id="sidebar-close">&times;</button>
    <div id="sidebar-header">
      <div id="sidebar-title"></div>
      <div id="sidebar-meta"></div>
      <div id="sidebar-source"></div>
    </div>
    <div id="sidebar-body">
      <div id="sidebar-prose"></div>
      <div id="sidebar-connections">
        <div id="connections-outgoing"></div>
        <div id="connections-incoming"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/force-graph"></script>
  <script>
    const TOPIC_COLORS = {
      'ai-agents': '#6366f1',
      'ai-native-product-architecture': '#8b5cf6',
      'ai-coding-tools': '#06b6d4',
      'future-of-ai-business': '#f59e0b',
      'business-models': '#10b981',
      'knowledge-systems': '#f43f5e',
    };

    const TOPIC_LABELS = {
      'ai-agents': 'AI Agents',
      'ai-native-product-architecture': 'Architecture',
      'ai-coding-tools': 'Coding Tools',
      'future-of-ai-business': 'Future of AI',
      'business-models': 'Business Models',
      'knowledge-systems': 'Knowledge Systems',
    };

    let graphData = null;
    let contentData = null;
    let graph = null;
    let selectedNode = null;
    let activeTopic = null;

    // Precompute neighbor sets per node
    const neighbors = {};  // nodeId -> Set of connected nodeIds
    const nodeById = {};

    async function init() {
      const [gRes, cRes] = await Promise.all([
        fetch('graph-data.json').then(r => r.json()),
        fetch('content-data.json').then(r => r.json()),
      ]);
      graphData = gRes;
      contentData = cRes;

      // Build lookup maps
      for (const node of graphData.nodes) {
        nodeById[node.id] = node;
        neighbors[node.id] = new Set();
      }
      for (const link of graphData.links) {
        const s = typeof link.source === 'object' ? link.source.id : link.source;
        const t = typeof link.target === 'object' ? link.target.id : link.target;
        neighbors[s].add(t);
        neighbors[t].add(s);
      }

      buildFilters();
      buildGraph();
    }

    function buildFilters() {
      const container = document.getElementById('filters');
      for (const [topic, color] of Object.entries(TOPIC_COLORS)) {
        const pill = document.createElement('div');
        pill.className = 'filter-pill';
        pill.textContent = TOPIC_LABELS[topic];
        pill.style.borderColor = color;
        pill.style.setProperty('--pill-color', color);
        pill.addEventListener('click', () => toggleTopic(topic, pill));
        container.appendChild(pill);
      }
    }

    function toggleTopic(topic, pill) {
      dismissOnboarding();
      if (activeTopic === topic) {
        activeTopic = null;
        pill.classList.remove('active');
      } else {
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        activeTopic = topic;
        pill.classList.add('active');
      }
      graph.nodeColor(graph.nodeColor()); // trigger re-render
    }

    function buildGraph() {
      const container = document.getElementById('graph-container');
      const maxDegree = Math.max(...graphData.nodes.map(n => n.degree));

      graph = ForceGraph()(container)
        .graphData(graphData)
        .backgroundColor('#0f1117')
        .nodeId('id')
        .nodeVal(n => 3 + (n.degree / maxDegree) * 25)
        .nodeColor(n => {
          if (activeTopic && !n.topics.includes(activeTopic)) return 'rgba(100,100,100,0.15)';
          if (selectedNode && selectedNode !== n.id && !neighbors[selectedNode].has(n.id)) return 'rgba(100,100,100,0.15)';
          return n.color;
        })
        .nodeCanvasObjectMode(() => 'after')
        .nodeCanvasObject((node, ctx, globalScale) => {
          // Show labels when zoomed in enough
          if (globalScale < 1.2) return;
          const label = node.label;
          const fontSize = 12 / globalScale;
          ctx.font = `${fontSize}px Sans-Serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';

          if (activeTopic && !node.topics.includes(activeTopic)) {
            ctx.fillStyle = 'rgba(100,100,100,0.2)';
          } else if (selectedNode && selectedNode !== node.id && !neighbors[selectedNode].has(node.id)) {
            ctx.fillStyle = 'rgba(100,100,100,0.2)';
          } else {
            ctx.fillStyle = '#e2e8f0';
          }

          const r = Math.sqrt(3 + (node.degree / maxDegree) * 25) * 2;
          ctx.fillText(label, node.x, node.y + r + fontSize);
        })
        .linkColor(() => 'rgba(100, 116, 139, 0.2)')
        .linkWidth(0.4)
        .linkDirectionalArrowLength(3.5)
        .linkDirectionalArrowRelPos(1)
        .linkDirectionalArrowColor(() => 'rgba(100, 116, 139, 0.35)')
        .cooldownTicks(400)
        .onNodeHover(handleHover)
        .onNodeClick(handleClick)
        .onBackgroundClick(handleBackgroundClick)
        .onEngineStop(() => {
          // After simulation settles, zoom to fit the whole graph with padding
          graph.zoomToFit(1000, 80);
        });

      // Physics: strong repulsion so nodes spread across the viewport
      graph.d3Force('charge', d3.forceManyBody().strength(-1500));
      graph.d3Force('link').distance(200);
      graph.d3Force('center', d3.forceCenter());
    }

    function handleHover(node) {
      const tooltip = document.getElementById('tooltip');
      const container = document.getElementById('graph-container');
      container.style.cursor = node ? 'pointer' : 'default';

      if (node) {
        tooltip.textContent = node.label;
        tooltip.style.display = 'block';

        // Position tooltip near mouse via graph coords
        const { x, y } = graph.graph2ScreenCoords(node.x, node.y);
        tooltip.style.left = (x + 12) + 'px';
        tooltip.style.top = (y - 30) + 'px';
      } else {
        tooltip.style.display = 'none';
      }
    }

    function dismissOnboarding() {
      const el = document.getElementById('onboarding');
      if (el) el.classList.add('hidden');
    }

    function handleClick(node) {
      if (!node) return;
      dismissOnboarding();
      selectedNode = node.id;
      graph.nodeColor(graph.nodeColor());
      openSidebar(node);
      flyTo(node);
    }

    function handleBackgroundClick() {
      closeSidebar();
    }

    function flyTo(node) {
      graph.centerAt(node.x, node.y, 1000);
      graph.zoom(4, 1000);
    }

    function flyToSlug(slug) {
      const node = nodeById[slug];
      if (!node) return;
      // Find the live node object from the graph data (has x,y after simulation)
      const liveNode = graphData.nodes.find(n => n.id === slug);
      if (!liveNode) return;
      selectedNode = slug;
      graph.nodeColor(graph.nodeColor());
      openSidebar(liveNode);
      flyTo(liveNode);
    }

    function openSidebar(node) {
      const sidebar = document.getElementById('sidebar');
      const titleEl = document.getElementById('sidebar-title');
      const metaEl = document.getElementById('sidebar-meta');
      const sourceEl = document.getElementById('sidebar-source');
      const proseEl = document.getElementById('sidebar-prose');
      const outEl = document.getElementById('connections-outgoing');
      const inEl = document.getElementById('connections-incoming');

      titleEl.textContent = node.label;

      // Topic tags
      metaEl.innerHTML = node.topics.map(t =>
        `<span class="topic-tag" style="border-left: 3px solid ${TOPIC_COLORS[t]}; padding-left: 6px;">${TOPIC_LABELS[t]}</span>`
      ).join('');

      sourceEl.textContent = node.source || '';

      // Prose content
      const content = contentData[node.id];
      if (content) {
        proseEl.innerHTML = content.html;
        // Attach wikilink click handlers
        proseEl.querySelectorAll('.wikilink').forEach(a => {
          a.addEventListener('click', e => {
            e.preventDefault();
            flyToSlug(a.dataset.slug);
          });
        });
      } else {
        proseEl.innerHTML = '<p style="color: #64748b;">No content available.</p>';
      }

      // Connections
      const yamlNode = graphData.nodes.find(n => n.id === node.id);
      const outLinks = graphData.links
        .filter(l => (typeof l.source === 'object' ? l.source.id : l.source) === node.id)
        .map(l => typeof l.target === 'object' ? l.target.id : l.target);
      const inLinks = graphData.links
        .filter(l => (typeof l.target === 'object' ? l.target.id : l.target) === node.id)
        .map(l => typeof l.source === 'object' ? l.source.id : l.source);

      outEl.innerHTML = outLinks.length
        ? `<h3>Outgoing (${outLinks.length})</h3>` + outLinks.map(slug =>
            `<a class="connection-link" data-slug="${slug}"><span class="arrow">&rarr;</span>${nodeById[slug]?.label || slug}</a>`
          ).join('')
        : '';

      inEl.innerHTML = inLinks.length
        ? `<h3>Incoming (${inLinks.length})</h3>` + inLinks.map(slug =>
            `<a class="connection-link" data-slug="${slug}"><span class="arrow">&larr;</span>${nodeById[slug]?.label || slug}</a>`
          ).join('')
        : '';

      // Attach connection click handlers
      sidebar.querySelectorAll('.connection-link').forEach(a => {
        a.addEventListener('click', e => {
          e.preventDefault();
          flyToSlug(a.dataset.slug);
        });
      });

      sidebar.classList.add('open');
    }

    function closeSidebar() {
      selectedNode = null;
      document.getElementById('sidebar').classList.remove('open');
      graph.nodeColor(graph.nodeColor());
    }

    document.getElementById('sidebar-close').addEventListener('click', closeSidebar);

    // d3 is bundled with force-graph, wait for script to load
    init();
  </script>
</body>
</html>
